<!DOCTYPE html>
<html>
<head>
  <title>Google Maps API Key Test</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #status { position: fixed; top: 10px; left: 10px; background: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 14px; z-index: 999; }
  </style>
</head>
<body>
  <div id="status">⏳ Loading Google Maps...</div>
  <div id="map"></div>

  <script>
    function initMap() {
      document.getElementById('status').innerHTML = '✅ Google Maps loaded successfully!';
      document.getElementById('status').style.background = '#d1fae5';
      new google.maps.Map(document.getElementById('map'), {
        center: { lat: 14.5995, lng: 120.9842 },
        zoom: 13,
      });
    }

    window.gm_authFailure = function() {
      const el = document.getElementById('status');
      el.innerHTML = '❌ Auth failure — check API key, billing, or API activation';
      el.style.background = '#fee2e2';
    };
  </script>
  <script 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2WFoRbVp3HPXHotn27e600KWnHJZZQ80&callback=initMap&v=weekly"
    async defer>
  </script>
</body>
</html>
